service:
  extensions: [jaeger_storage, jaeger_query]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter, spanmetrics]
    metrics/spanmetrics:
      receivers: [spanmetrics]
      exporters: [prometheus]
  telemetry:
    resource:
      service.name: jaeger
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
    logs:
      level: info

extensions:
  jaeger_query:
    storage:
      traces: some_storage
      metrics: some_metrics_storage
    ui:
      config_file: /etc/jaeger/jaeger-ui.json
  jaeger_storage:
    backends:
      some_storage:
        opensearch:
          server_urls:
            - http://opensearch:9200
          indices:
            index_prefix: jaeger
            spans:
              shards: 1
              replicas: 0
            services:
              shards: 1
              replicas: 0
            dependencies:
              shards: 1
              replicas: 0
    metric_backends:
      some_metrics_storage:
        prometheus:
          endpoint: http://prometheus:9090
          normalize_calls: true
          normalize_duration: true

connectors:
  spanmetrics:
    metrics_flush_interval: 15s

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  jaeger_storage_exporter:
    trace_storage: some_storage
  prometheus:
    endpoint: "0.0.0.0:8889"
