services:
  mongo:
    image: mongo:7
    container_name: mongo
    networks:
      - lab-net
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_BASICAUTH=false
    networks:
      - lab-net
    depends_on:
      - mongo

  backend:
    build: ./backend
    container_name: backend
    environment:
      - MONGO_URL=mongodb://mongo:27017/products
      - APP_NAME=backend
      - STATS_URL=http://stats:3001
      - OTEL_SERVICE_NAME=backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - OTEL_PROPAGATORS=tracecontext,baggage
    networks:
      - lab-net
    depends_on:
      - mongo
      - otel-collector
      - stats
  stats:
    build: ./stats
    container_name: stats
    environment:
      - MONGO_URL=mongodb://mongo:27017/products
      - APP_NAME=stats
      - OTEL_SERVICE_NAME=stats
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - OTEL_PROPAGATORS=tracecontext,baggage
    networks:
      - lab-net
    depends_on:
      - mongo
      - otel-collector

  tempo:
    image: grafana/tempo:2.7.1
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    networks:
      - lab-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3200/ready" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_SECRET_KEY=${GRAFANA_SECRET_KEY:-change-this-secret}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/lab-overview.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - lab-net
    depends_on:
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_started
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: otel-collector
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./monitoring/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4318:4318"
      - "4317:4317"
    networks:
      - lab-net
    depends_on:
      jaeger:
        condition: service_healthy
      tempo:
        condition: service_healthy
      coroot:
        condition: service_healthy
    restart: unless-stopped

  coroot-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: coroot-clickhouse
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    volumes:
      - coroot-clickhouse-data:/var/lib/clickhouse
      - coroot-clickhouse-logs:/var/log/clickhouse-server
      - ./monitoring/coroot/clickhouse-disable-system-logs.xml:/etc/clickhouse-server/config.d/disable-system-logs.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - lab-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  coroot-prometheus:
    image: prom/prometheus:v2.53.5
    container_name: coroot-prometheus
    volumes:
      - coroot-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    networks:
      - lab-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  coroot:
    image: ghcr.io/coroot/coroot
    container_name: coroot
    user: root
    ports:
      - "8082:8080"
    volumes:
      - coroot-data:/data
    command:
      - '--data-dir=/data'
      - '--bootstrap-prometheus-url=http://coroot-prometheus:9090'
      - '--bootstrap-refresh-interval=15s'
      - '--bootstrap-clickhouse-address=coroot-clickhouse:9000'
    networks:
      - lab-net
    depends_on:
      coroot-clickhouse:
        condition: service_healthy
      coroot-prometheus:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/ > /dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  coroot-node-agent:
    image: ghcr.io/coroot/coroot-node-agent
    container_name: coroot-node-agent
    privileged: true
    pid: "host"
    volumes:
      - /sys/kernel/tracing:/sys/kernel/tracing
      - /sys/kernel/debug:/sys/kernel/debug
      - /sys/fs/cgroup:/host/sys/fs/cgroup
      - coroot-node-agent-data:/data
    command:
      - '--collector-endpoint=http://coroot:8080'
      - '--cgroupfs-root=/host/sys/fs/cgroup'
      - '--wal-dir=/data'
    networks:
      - lab-net
    depends_on:
      coroot:
        condition: service_healthy
    restart: unless-stopped

  coroot-cluster-agent:
    image: ghcr.io/coroot/coroot-cluster-agent
    container_name: coroot-cluster-agent
    volumes:
      - coroot-cluster-agent-data:/data
    command:
      - '--coroot-url=http://coroot:8080'
      - '--metrics-scrape-interval=15s'
      - '--metrics-wal-dir=/data'
    networks:
      - lab-net
    depends_on:
      coroot:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - lab-net

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    networks:
      - lab-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  alert-watcher:
    build: ./alert-watcher
    container_name: alert-watcher
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - CHAT_ID=${CHAT_ID}
      - OS_HOST=http://opensearch:9200
      - JAEGER_UI=http://localhost:16686
      - SLOW_MS=1000
      - CHECK_INTERVAL=60
    networks:
      - lab-net
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped

  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: jaeger
    command: [ "--config", "/etc/jaeger/config-spm.yaml" ]
    volumes:
      - ./monitoring/jaeger:/etc/jaeger:ro
    ports:
      - "16686:16686" # UI
    environment:
      - SPANMETRICS_FLUSH_INTERVAL=15s
    networks:
      - lab-net
    depends_on:
      opensearch:
        condition: service_healthy
      prometheus:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:16686 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - lab-net
    depends_on:
      - backend

networks:
  lab-net:
    driver: bridge

volumes:
  mongo-data:
  prometheus-data:
  opensearch-data:
  tempo-data:
  grafana-data:
  coroot-clickhouse-data:
  coroot-clickhouse-logs:
  coroot-prometheus-data:
  coroot-data:
  coroot-node-agent-data:
  coroot-cluster-agent-data:

